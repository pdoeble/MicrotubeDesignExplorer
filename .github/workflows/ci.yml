name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  prohibited-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for prohibited files
        run: python scripts/check_prohibited_files.py

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync environment (locked)
        run: uv sync --locked
      - name: Ruff (package, tests, scripts)
        run: uv run ruff check ..
      - name: Ruff format check
        run: uv run ruff format --check ..
      - name: mypy
        run: uv run mypy .
      - name: pytest
        run: uv run pytest
      - name: Contract artifacts in sync
        run: |
          uv run python ../scripts/export_contracts.py
          git diff --exit-code ../src/contracts

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install uv for Pyodide wheel build
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Generated contract types in sync
        run: |
          pnpm generate:contracts
          git diff --exit-code src/contracts/generated
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
          VITE_COMMIT_HASH: ${{ github.sha }}
